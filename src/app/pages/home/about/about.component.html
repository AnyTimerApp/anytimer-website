<section class="section faq-section" id="faq">
  <div class="container">
    <div class="faq-layout">

      <!-- Left heading -->
      <div class="faq-left">
        <span class="section-label">Veelgestelde vragen</span>
        <h2 class="faq-title">Alles wat je wil weten</h2>
        <p class="faq-desc">
          Heb je een andere vraag? Neem contact met ons op via
          <a routerLink="/contact" class="faq-link">het contactformulier</a>.
        </p>
        <div class="faq-app-promo" (click)="scrollToTop()" style="cursor:pointer;">
          <div class="faq-promo-icon">
            <img src="assets/logo.png" alt="Anytimer" width="32" height="32">
          </div>
          <div>
            <strong>Klaar om te starten?</strong>
            <span>Download de app en begin vandaag</span>
          </div>
        </div>
      </div>

      <!-- Right accordion -->
      <div class="faq-right">
        @for (faq of faqs; track faq.question; let i = $index) {
          <div class="faq-item" [class.faq-item--open]="faq.open" (click)="toggle(i)">
            <div class="faq-question">
              <span>{{ faq.question }}</span>
              <div class="faq-icon">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5">
                  <path d="M19 9l-7 7-7-7"/>
                </svg>
              </div>
            </div>
            @if (faq.open) {
              <div class="faq-answer">
                <p>{{ faq.answer }}</p>
              </div>
            }
          </div>
        }
      </div>

    </div>
  </div>
</section>
