<nav class="navbar" [class.scrolled]="isScrolled || !isHeroPage">
  <div class="container nav-inner">
    <a routerLink="/" class="logo" (click)="scrollToTop()">
      <div class="logo-icon">
        <picture style="display: contents">
          <source srcset="assets/logo.webp" type="image/webp">
          <img src="assets/logo.png" alt="AnyTimerApp logo icon" class="logo-img">
        </picture>
      </div>
      <span>AnyTimerApp</span>
    </a>

    <div class="nav-links" [class.open]="menuOpen">
      <a routerLink="/" fragment="features" (click)="closeMenu()">Features</a>
      <a routerLink="/" fragment="hoe-het-werkt" (click)="closeMenu()">Hoe het werkt</a>
      <a routerLink="/" fragment="faq" (click)="closeMenu()">FAQ</a>
      <a routerLink="/" fragment="team" (click)="closeMenu()">Team</a>
      <div class="nav-item nav-item--dropdown" [class.open]="blogMenuOpen">
        <a routerLink="/blog" (click)="closeMenu()">Blog</a>
        <button
          type="button"
          class="nav-item__toggle"
          aria-label="Categorieën tonen"
          [attr.aria-expanded]="blogMenuOpen"
          (click)="toggleBlogMenu($event)"
        >
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>
        <div class="nav-dropdown">
          @for (item of blogCategories; track item.slug) {
          <a [routerLink]="'/blog/' + item.slug" (click)="closeMenu()">{{ item.category }}</a>
          }
        </div>
      </div>
    </div>

    <div class="nav-actions">
      <a [href]="downloadUrl" target="_blank" rel="noopener" class="btn btn-primary btn-sm">Download</a>
    </div>

    <button aria-label="hamburger-menu" class="hamburger" [class.active]="menuOpen" (click)="toggleMenu()">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</nav>
