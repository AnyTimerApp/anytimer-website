<div class="timer-container" (click)="toggleTimer()">
  <!-- Floating circles background -->
  <div class="circle circle-1"></div>
  <div class="circle circle-2"></div>
  <div class="circle circle-3"></div>
  <div class="circle circle-4"></div>
  <div class="circle circle-5"></div>
  <div class="circle circle-6"></div>
  <div class="circle circle-7"></div>
  <div class="circle circle-8"></div>

  <!-- Timer display -->
  <div class="timer-content">
    <div class="timer-label">Any timer</div>
    <div class="timer-display">{{ displayTime }}</div>

    <div class="fingerprint-section">
      <svg class="fingerprint-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M12 1a4 4 0 0 0-4 4v7a6 6 0 0 0 6 6 6 6 0 0 0 6-6V5a4 4 0 0 0-4-4"></path>
        <path d="M8 12a4 4 0 0 0 2 3.5"></path>
        <path d="M12 12v3.5"></path>
        <path d="M16 12a4 4 0 0 1-2 3.5"></path>
        <circle cx="9" cy="18" r="0.5" fill="currentColor"></circle>
        <circle cx="12" cy="19" r="0.5" fill="currentColor"></circle>
        <circle cx="15" cy="18" r="0.5" fill="currentColor"></circle>
      </svg>
      <div class="tap-text">Tap the screen to {{ isRunning ? 'stop' : 'start' }} the timer</div>
    </div>
  </div>

</div>
